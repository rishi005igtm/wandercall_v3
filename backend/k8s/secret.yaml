# ═══════════════════════════════════════════════════════════════════════════════
# Wandercall — Kubernetes Secret template
# ⚠️  DO NOT commit real values. In production, inject via:
#   - AWS Secrets Manager + External Secrets Operator
#   - kubectl create secret generic ... (CI/CD pipeline)
#   - Sealed Secrets / SOPS
# All values must be base64-encoded: echo -n "value" | base64
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: wandercall-secrets
  namespace: wandercall
  labels:
    app.kubernetes.io/name: wandercall-api
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Required — base64-encoded
  DB_HOST: cGxhY2Vob2xkZXI=           # placeholder
  DB_PASSWORD: cGxhY2Vob2xkZXI=       # placeholder
  DB_USERNAME: cGxhY2Vob2xkZXI=       # placeholder
  DB_NAME: cGxhY2Vob2xkZXI=           # placeholder
  JWT_SECRET: cGxhY2Vob2xkZXI=        # placeholder
  JWT_REFRESH_SECRET: cGxhY2Vob2xkZXI= # placeholder
  # Optional — fill as needed
  LIVEKIT_API_KEY: cGxhY2Vob2xkZXI=
  LIVEKIT_API_SECRET: cGxhY2Vob2xkZXI=
  CLOUDINARY_CLOUD_NAME: cGxhY2Vob2xkZXI=
  CLOUDINARY_API_KEY: cGxhY2Vob2xkZXI=
  CLOUDINARY_API_SECRET: cGxhY2Vob2xkZXI=
  OPENAI_API_KEY: cGxhY2Vob2xkZXI=
  MAIL_USER: cGxhY2Vob2xkZXI=
  MAIL_PASSWORD: cGxhY2Vob2xkZXI=
  REDIS_PASSWORD: cGxhY2Vob2xkZXI=
  ENCRYPTION_KEY: cGxhY2Vob2xkZXI=
