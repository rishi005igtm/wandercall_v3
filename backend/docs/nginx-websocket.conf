# ═══════════════════════════════════════════════════════════════════════════════
# Wandercall Enterprise Nginx Reverse Proxy Configuration
# Production WebSocket (Socket.IO) & REST Proxy setup for api.wandercall.com
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name api.wandercall.com;

    # Force HTTP to HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.wandercall.com;

    ssl_certificate /etc/letsencrypt/live/api.wandercall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wandercall.com/privkey.pem;

    # SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Socket.IO Realtime Endpoint ───────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;

        # Mandatory HTTP/1.1 for WebSocket upgrade
        proxy_http_version 1.1;

        # Upgrade Headers for WSS Handshake
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Forwarded Client Metadata
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable proxy buffering for instant real-time message streaming
        proxy_buffering off;
        proxy_cache off;

        # Timeouts for persistent long-lived connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Sticky sessions cookie (if using multiple upstream pods without Redis)
        # Note: With RedisIoAdapter enabled in NestJS, sticky sessions are optional.
    }

    # ── REST API Endpoint ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
