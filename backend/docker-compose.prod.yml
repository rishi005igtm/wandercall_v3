# ═══════════════════════════════════════════════════════════════════════════════
# Wandercall Backend — Production Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# All secrets must be injected via environment or Docker Secrets — never in image.
# ═══════════════════════════════════════════════════════════════════════════════
version: "3.9"

services:
  api:
    # In production, always use a pre-built tagged image — never rebuild here.
    # Build the image in CI/CD and push to ECR, then set TAG= when deploying.
    image: wandercall-backend:${TAG:?TAG is required for production deployment}
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first           # Zero-downtime rolling update
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${PORT:-5000}:5000"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    # Harden: no exposed port in production — only accessible within wandercall-net
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    # Harden: no exposed port in production — only accessible within wandercall-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
